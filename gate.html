<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #10100e;
    --cream: #FFFFE3;
    --grey: #93937F;
    --line: rgba(255,255,227,0.14);
    --radius: 12px;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem;
  }
  .gate {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
  }
  .gate__logo {
    width: 200px;
    color: var(--cream);
  }
  .gate__logo svg { width: 100%; height: auto; }
  .gate__copy {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .gate__copy h1 {
    font-size: 1.125rem;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--cream);
  }
  .gate__copy p {
    font-size: 0.875rem;
    color: var(--grey);
    line-height: 1.6;
  }
  .gate__form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .gate__input {
    width: 100%;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--cream);
    font-size: 0.9375rem;
    padding: 0.875rem 1rem;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .gate__input::placeholder { color: var(--grey); }
  .gate__input:focus { border-color: rgba(255,255,227,0.4); }
  .gate__input.is-error { border-color: rgba(255,100,100,0.6); }
  .gate__btn {
    width: 100%;
    background: var(--cream);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-size: 0.9375rem;
    font-weight: 600;
    padding: 0.875rem 1rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .gate__btn:hover { opacity: 0.88; }
  .gate__error {
    display: none;
    font-size: 0.8125rem;
    color: rgba(255,140,140,0.9);
    text-align: center;
  }
</style>
</head>

  <form class="gate__form" method="POST" action="/auth">
    <input type="hidden" name="to" id="gateTo" value="/">

      name="password"
      placeholder="Password"
      autocomplete="current-password"

<script>
  (function() {
    var p = new URLSearchParams(location.search);
    if (p.get('gate_error')) {
      document.getElementById('gateError').style.display = 'block';
      document.getElementById('gateInput').classList.add('is-error');
    }
    var to = p.get('to') || location.pathname;
    document.getElementById('gateTo').value = to;
  })();
</script>
